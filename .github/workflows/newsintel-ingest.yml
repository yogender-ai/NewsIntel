name: NewsIntel Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: ${{ secrets.NEWSINTEL_DATABASE_URL }}
      REDIS_URL: ${{ secrets.NEWSINTEL_REDIS_URL }}
      WORKER_MODE: once
      INGEST_TOPICS: ai,tech,markets,crypto
      INGEST_REGIONS: global
      INGEST_MAX_ARTICLES: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Ingest latest news
        run: python -m app.workers.ingestion_worker
